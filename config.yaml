  auto_approve_threshold: 90
  max_auto_trades_per_day: 5
account:
  capital: 1000000
  max_positions: 15
  max_position_pct: 10.0
universe:
  min_market_cap: 1000000000
  core_symbols:
  - SPY
  - QQQ
  - NVDA
  - TSLA
compression:
  atr_squeeze_threshold: 0.015
  volume_decline_threshold: 0.8
