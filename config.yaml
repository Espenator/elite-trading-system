      scalper: 15
      balanced: 30
      swing: 60
    max_move_pct:
      scalper: 2.0
      balanced: 3.0
      swing: 5.0
    max_volume_ratio:
      scalper: 2.0
      balanced: 2.5
      swing: 3.0
ai_control:
