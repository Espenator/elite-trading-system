    velez: 0.3
    explosive: 0.2
    compression: 0.15
    dark_pool: 0.1
    options_flow: 0.1
    sector_strength: 0.1
    ml_probability: 0.05
risk:
  atr_multiplier_momentum: 2.5
  atr_multiplier_reversal: 3.0
  breakeven_trigger_r: 1.0
  partial_exit_r: 2.0
market:
  vix_level: 16.5
  breadth_ratio: 0.28
  vix_rsi_14: 50
  green_vix_max: 20
  yellow_vix_max: 30
  green_risk_pct: 2.0
  yellow_risk_pct: 1.0
  red_risk_pct: 0.0
  red_recovery_risk_pct: 0.5
schedule:
  enabled: true
  timezone: America/New_York
  market_hours:
    start: 09:30
    end: '16:00'
  scan_interval_min: 15
logging:
  level: INFO
  file: data/logs/system.log
  max_size_mb: 100
  retention_days: 30
alerts:
  telegram_enabled: true
  email_enabled: true
  min_signal_score_to_alert: 85
ml:
  model_type: xgboost
  retrain_schedule: Sunday 23:00
  min_trades_for_training: 50
  test_size: 0.2


