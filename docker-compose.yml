# Elite Trading System - Docker Compose
# Run: docker-compose up -d

version: '3.8'

networks:
  trading:
    driver: bridge

volumes:
  duckdb_data:
  model_artifacts:

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elite-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - TRADING_MODE=${TRADING_MODE:-live}
      - ENVIRONMENT=production
    volumes:
      - duckdb_data:/app/data
      - model_artifacts:/app/models/artifacts
    networks:
      - trading
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend-v2
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: elite-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trading
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
