# Docker Compose — full stack for local/dev. Backend + Brain gRPC + Redis.
# Run: docker-compose up -d
# Health: docker-compose ps (backend :8000, brain :50051, redis :6379)
# Backend talks to brain via service name "brain" and Redis via "redis".

version: "3.9"

services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt -q && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      TRADING_MODE: paper
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      BRAIN_HOST: brain
      BRAIN_PORT: "50051"
      REDIS_URL: redis://redis:6379
    depends_on:
      brain:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  brain:
    image: python:3.11-slim
    working_dir: /app/brain_service
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt -q && python server.py"
    ports:
      - "50051:50051"
    environment:
      BRAIN_PORT: "50051"
      OLLAMA_HOST: ${OLLAMA_HOST:-host.docker.internal}
      OLLAMA_PORT: "11434"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',50051)); s.close()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
