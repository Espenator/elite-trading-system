# CI — Lint, type-check, test (backend + frontend). Runs on push to main, PRs, and manual.
# Target: < 10 minutes on GitHub Actions free tier.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TRADING_MODE: paper
  ALPACA_API_KEY: test
  ALPACA_SECRET_KEY: test
  KELLY_FRACTION: "0.25"
  MAX_PORTFOLIO_RISK: "0.02"
  MAX_DRAWDOWN_PCT: "0.15"
  RISK_FREE_RATE: "0.05"

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 9
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black isort mypy

      - name: Lint (Black)
        run: black --check app tests
        continue-on-error: true

      - name: Lint (isort)
        run: isort --check-only app tests
        continue-on-error: true

      - name: Type-check (mypy strict for council & trading)
        run: |
          mypy app/council app/services/trading --ignore-missing-imports --no-error-summary 2>/dev/null || true
        continue-on-error: true

      - name: Run pytest
        run: pytest tests/ -n 2 --tb=short -q --cov=app --cov-report=term-missing
        env:
          TRADING_MODE: paper
          ALPACA_API_KEY: test
          ALPACA_SECRET_KEY: test
          DUCKDB_PATH: ":memory:"
          KELLY_FRACTION: "0.25"
          MAX_PORTFOLIO_RISK: "0.02"
          MAX_DRAWDOWN_PCT: "0.15"
          RISK_FREE_RATE: "0.05"

      - name: Validate risk parameters
        run: |
          python -c "
          import os
          kelly = float(os.getenv('KELLY_FRACTION', '0.25'))
          max_risk = float(os.getenv('MAX_PORTFOLIO_RISK', '0.02'))
          max_dd = float(os.getenv('MAX_DRAWDOWN_PCT', '0.15'))
          assert 0 < kelly <= 0.5, f'Kelly fraction {kelly} out of safe range'
          assert 0 < max_risk <= 0.05, f'Portfolio risk {max_risk} too high'
          assert 0 < max_dd <= 0.25, f'Max drawdown {max_dd} too high'
          print('Risk parameters validated successfully')
          "

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 6
    defaults:
      run:
        working-directory: ./frontend-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

  e2e-gate:
    name: E2E
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install frontend deps
        working-directory: ./frontend-v2
        run: npm ci

      - name: Install Playwright
        working-directory: ./frontend-v2
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: ./frontend-v2
        run: npx playwright test --reporter=github
        env:
          CI: true
          HAS_BACKEND: "false"
