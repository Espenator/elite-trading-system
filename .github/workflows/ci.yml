name: CI - Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Backend: 1,182+ tests (as of March 2026). Fail if pytest exits non-zero.
      - name: Run pytest
        run: pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          TRADING_MODE: paper
          ALPACA_API_KEY: test
          ALPACA_SECRET_KEY: test
          KELLY_FRACTION: 0.25
          MAX_PORTFOLIO_RISK: 0.02
          MAX_DRAWDOWN_PCT: 0.15
          RISK_FREE_RATE: 0.05

      - name: Validate risk parameters
        run: |
          python -c "
          import os
          kelly = float(os.getenv('KELLY_FRACTION', '0.25'))
          max_risk = float(os.getenv('MAX_PORTFOLIO_RISK', '0.02'))
          max_dd = float(os.getenv('MAX_DRAWDOWN_PCT', '0.15'))
          assert 0 < kelly <= 0.5, f'Kelly fraction {kelly} out of safe range'
          assert 0 < max_risk <= 0.05, f'Portfolio risk {max_risk} too high'
          assert 0 < max_dd <= 0.25, f'Max drawdown {max_dd} too high'
          print('Risk parameters validated successfully')
          "
        env:
          KELLY_FRACTION: 0.25
          MAX_PORTFOLIO_RISK: 0.02
          MAX_DRAWDOWN_PCT: 0.15

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-v2

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # Frontend smoke: app boot + 14 pages render without crash (no backend required).
  # Full pipeline E2E (bar→signal→council→order) would require backend + optional paper run.
  frontend-smoke:
    name: Frontend smoke
    needs: [frontend-build, backend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install deps
        working-directory: ./frontend-v2
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend-v2
        run: npx playwright install --with-deps chromium

      - name: Run frontend smoke tests
        working-directory: ./frontend-v2
        run: npx playwright test --reporter=github
        env:
          CI: true
          HAS_BACKEND: "false"
