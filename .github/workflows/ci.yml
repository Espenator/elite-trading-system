name: CI - Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          TRADING_MODE: paper
          ALPACA_API_KEY: test
          ALPACA_SECRET_KEY: test
          KELLY_FRACTION: 0.25
          MAX_PORTFOLIO_RISK: 0.02
          MAX_DRAWDOWN_PCT: 0.15
          RISK_FREE_RATE: 0.05

      - name: Validate risk parameters
        run: |
          python -c "
          import os
          kelly = float(os.getenv('KELLY_FRACTION', '0.25'))
          max_risk = float(os.getenv('MAX_PORTFOLIO_RISK', '0.02'))
          max_dd = float(os.getenv('MAX_DRAWDOWN_PCT', '0.15'))
          assert 0 < kelly <= 0.5, f'Kelly fraction {kelly} out of safe range'
          assert 0 < max_risk <= 0.05, f'Portfolio risk {max_risk} too high'
          assert 0 < max_dd <= 0.25, f'Max drawdown {max_dd} too high'
          print('Risk parameters validated successfully')
          "
        env:
          KELLY_FRACTION: 0.25
          MAX_PORTFOLIO_RISK: 0.02
          MAX_DRAWDOWN_PCT: 0.15

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-v2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build