# Electron Builder Configuration
# Embodier Trader Desktop App
# Build targets: Windows (primary), macOS (future)

appId: com.embodier.trader
productName: Embodier Trader
copyright: Copyright © 2025 Espenator

directories:
  output: dist
  buildResources: build

files:
  - "**/*"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"

extraResources:
  - from: "../backend"
    to: "backend"
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/venv/**"
      - "!**/.pytest_cache/**"
      - "!**/dist/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: icons/icon.ico
  artifactName: "${productName}-${version}-Setup.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  installerIcon: icons/icon.ico
  uninstallerIcon: icons/icon.ico
  installerHeaderIcon: icons/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Embodier Trader

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: icons/icon.icns
  category: public.app-category.finance
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  releaseType: release

asar: true
asarUnpack:
  - "**/*.node"
  - "**/node_modules/sharp/**"

electron:
  version: "28.0.0"