<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embodier Trader — Loading</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0B0E14;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    text-align: center;
    max-width: 520px;
    padding: 40px;
  }
  .logo {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, #00d9ff, #8b5cf6);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 30px rgba(0, 217, 255, 0.3); }
    50% { box-shadow: 0 0 50px rgba(0, 217, 255, 0.5); }
  }
  .logo svg {
    width: 36px;
    height: 36px;
    fill: white;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 32px;
  }
  .status-box {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .status-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    font-size: 13px;
  }
  .status-item + .status-item {
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.waiting {
    background: #f59e0b;
    animation: blink 1.5s ease-in-out infinite;
  }
  .dot.ready {
    background: #10b981;
  }
  .dot.error {
    background: #ef4444;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .label {
    color: #94a3b8;
    flex: 1;
    text-align: left;
  }
  .value {
    color: #e2e8f0;
    font-weight: 500;
    font-size: 12px;
  }
  .progress-bar {
    width: 100%;
    height: 3px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 16px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00d9ff, #8b5cf6);
    border-radius: 2px;
    animation: loading 2.5s ease-in-out infinite;
  }
  @keyframes loading {
    0% { width: 5%; margin-left: 0; }
    50% { width: 50%; margin-left: 25%; }
    100% { width: 5%; margin-left: 95%; }
  }
  .hint {
    font-size: 12px;
    color: #475569;
    margin-top: 20px;
    line-height: 1.5;
  }
  .hint code {
    background: rgba(0, 217, 255, 0.1);
    color: #00d9ff;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 11px;
  }
  #error-hint {
    display: none;
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: 8px;
    font-size: 12px;
    color: #fca5a5;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
  </div>
  <h1>Embodier Trader</h1>
  <div class="subtitle">Connecting to development server...</div>

  <div class="status-box">
    <div class="status-item">
      <div class="dot ready" id="dot-backend"></div>
      <span class="label">Backend Server</span>
      <span class="value" id="val-backend">Starting...</span>
    </div>
    <div class="status-item">
      <div class="dot waiting" id="dot-frontend"></div>
      <span class="label">Frontend (Vite)</span>
      <span class="value" id="val-frontend">Waiting...</span>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>

  <div class="hint">
    If the app doesn't load, make sure the Vite dev server is running:<br>
    <code>cd frontend-v2 && npm run dev</code>
  </div>

  <div id="error-hint">
    Dev server not detected after 30 seconds.<br>
    Start it manually: <code>cd frontend-v2 && npm run dev</code>
  </div>
</div>

<script>
  // Update status dots based on messages from main process (if we add IPC later)
  // For now, just show animated loading state
  let elapsed = 0;
  const timer = setInterval(() => {
    elapsed++;
    const valFrontend = document.getElementById('val-frontend');
    const dotFrontend = document.getElementById('dot-frontend');
    const errorHint = document.getElementById('error-hint');

    if (elapsed < 30) {
      valFrontend.textContent = `Waiting... (${elapsed}s)`;
    } else {
      dotFrontend.className = 'dot error';
      valFrontend.textContent = 'Not detected';
      errorHint.style.display = 'block';
      clearInterval(timer);
    }
  }, 1000);
</script>
</body>
</html>
