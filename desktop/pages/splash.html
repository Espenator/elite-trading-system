<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embodier Trader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }
  .splash {
    width: 440px;
    height: 320px;
    background: linear-gradient(145deg, #0a0e1a 0%, #111827 50%, #0d1321 100%);
    border: 1px solid rgba(0, 217, 255, 0.3);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 217, 255, 0.15);
    position: relative;
    overflow: hidden;
  }
  .splash::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(0, 217, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 60%);
    animation: ambient 8s ease-in-out infinite;
  }
  @keyframes ambient {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-5%, 3%); }
  }
  .logo {
    position: relative;
    z-index: 1;
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #00d9ff, #8b5cf6);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(0, 217, 255, 0.4);
  }
  .logo svg {
    width: 40px;
    height: 40px;
    fill: white;
  }
  .title {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .title h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .title p {
    font-size: 13px;
    color: rgba(0, 217, 255, 0.7);
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .loader {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .progress-bar {
    width: 200px;
    height: 3px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    width: 30%;
    height: 100%;
    background: linear-gradient(90deg, #00d9ff, #8b5cf6);
    border-radius: 2px;
    animation: loading 2s ease-in-out infinite;
  }
  @keyframes loading {
    0% { width: 5%; margin-left: 0; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 5%; margin-left: 95%; }
  }
  .status {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.4);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  .version {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.2);
    z-index: 1;
  }
</style>
</head>
<body>
<div class="splash">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
  </div>
  <div class="title">
    <h1>Embodier Trader</h1>
    <p>Elite Trading System</p>
  </div>
  <div class="loader">
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div class="status">Starting backend services...</div>
  </div>
  <div class="version">v4.1.0</div>
</div>
</body>
</html>
