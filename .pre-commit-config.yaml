# Pre-commit hooks — run: pre-commit install
# Then: pre-commit run --all-files (first time)
# See SETUP.md for full instructions.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100]
        files: ^backend/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]
        files: ^backend/

  - repo: local
    hooks:
      - id: mypy-council-trading
        name: mypy (council + trading)
        entry: python scripts/run_mypy_precommit.py
        language: system
        pass_filenames: false
        files: ^backend/

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        entry: npm run lint --prefix frontend-v2
        language: system
        pass_filenames: false
        files: ^frontend-v2/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend-v2/src/
        types_or: [javascript, jsx, json, css, markdown]
