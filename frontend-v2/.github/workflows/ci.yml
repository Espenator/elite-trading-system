name: CI — Build + Contract Tests + E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Frontend Build ----------
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json
      - run: npm ci
      - run: npm run build

  # ---------- Backend Contract Tests ----------
  backend-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short -k "alignment or preflight or contract"

  # ---------- E2E Playwright Tests ----------
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-contract]
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend-v2/playwright-report/
          retention-days: 30